services:
  sollu-website:
    image: ghcr.io/whykrr/sollu-website:latest
    container_name: sollu-website
    restart: always
    ports:
      - "8001:80" # Port 8001 di server ke port 80 di container
    env_file:
      - .env
    networks:
      - sollu-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m" # Maksimal ukuran 1 file log 10 Megabyte
        max-file: "3" # Simpan maksimal 3 file (lama akan dihapus)

networks:
  sollu-network:
    external: true # Kita buat network global agar bisa berkomunikasi dengan Proxy
